<aside th:fragment="sidebar(activeMenu)" class="flex flex-col w-64 min-h-screen bg-wms-surface border-r border-wms-border shrink-0">
    <div class="px-6 py-6 border-b border-wms-border">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-wms-accent flex items-center justify-center shrink-0">
                <i data-lucide="leaf" class="w-5 h-5 text-wms-bg stroke-[2.5]"></i>
            </div>
            <div class="min-w-0">
                <p class="font-syne text-sm font-extrabold text-wms-text leading-tight truncate">WildTrack</p>
                <p class="text-[10px] text-wms-muted font-dm-sans uppercase tracking-widest">Monitoring System</p>
            </div>
        </div>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto custom-scrollbar">

        <div class="mb-4">
            <p class="px-3 mb-2 text-[9px] uppercase tracking-widest text-wms-text-dim font-semibold">Main</p>

            <a th:href="@{/}"
               th:classappend="${activeMenu == 'dashboard' or activeMenu == 'dasbor'} ? 'bg-wms-accent/10 border border-wms-accent/20 text-wms-accent' : 'text-wms-text-muted hover:text-wms-text hover:bg-wms-surface-2'"
               class="group flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200">
                <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i>
                <div class="flex-1 min-w-0">
                    <span class="font-syne text-sm font-semibold truncate">Dashboard</span>
                </div>
            </a>

            <th:block th:if="${session.userRole == 'ADMINISTRATOR'}">
                <a th:href="@{/hewan}"
                   th:classappend="${activeMenu == 'hewan'} ? 'bg-wms-accent/10 border border-wms-accent/20 text-wms-accent' : 'text-wms-text-muted hover:text-wms-text hover:bg-wms-surface-2'"
                   class="group flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 mt-1">
                    <i data-lucide="paw-print" class="w-4 h-4 shrink-0"></i>
                    <div class="flex-1 min-w-0">
                        <span class="font-syne text-sm font-semibold truncate">Animals</span>
                    </div>
                </a>

                <a th:href="@{/perangkat}"
                   th:classappend="${activeMenu == 'perangkat'} ? 'bg-wms-accent/10 border border-wms-accent/20 text-wms-accent' : 'text-wms-text-muted hover:text-wms-text hover:bg-wms-surface-2'"
                   class="group flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 mt-1">
                    <i data-lucide="cpu" class="w-4 h-4 shrink-0"></i>
                    <div class="flex-1 min-w-0">
                        <span class="font-syne text-sm font-semibold truncate">Devices</span>
                    </div>
                </a>

                <a th:href="@{/admin/rbac}"
                   th:classappend="${activeMenu == 'rbac'} ? 'bg-blue-500/10 border border-blue-500/20 text-blue-400' : 'text-wms-text-muted hover:text-wms-text hover:bg-wms-surface-2'"
                   class="group flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 mt-1">
                    <i data-lucide="shield-check" class="w-4 h-4 shrink-0"></i>
                    <div class="flex-1 min-w-0">
                        <span class="font-syne text-sm font-semibold truncate">RBAC & Users</span>
                    </div>
                </a>
            </th:block>
        </div>

        <th:block th:if="${session.userRole == 'PENELITI'}">
            <div class="mb-4 mt-6">
                <p class="px-3 mb-2 text-[9px] uppercase tracking-widest text-wms-text-dim font-semibold">Analytics</p>

                <a th:href="@{/riwayat}"
                   th:classappend="${activeMenu == 'riwayat'} ? 'bg-wms-accent/10 border border-wms-accent/20 text-wms-accent' : 'text-wms-text-muted hover:text-wms-text hover:bg-wms-surface-2'"
                   class="group flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200">
                    <i data-lucide="history" class="w-4 h-4 shrink-0"></i>
                    <div class="flex-1 min-w-0">
                        <span class="font-syne text-sm font-semibold truncate">History Routes</span>
                    </div>
                </a>

                <a th:href="@{/geozone}"
                   th:classappend="${activeMenu == 'geozone'} ? 'bg-wms-accent/10 border border-wms-accent/20 text-wms-accent' : 'text-wms-text-muted hover:text-wms-text hover:bg-wms-surface-2'"
                   class="group flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 mt-1">
                    <i data-lucide="hexagon" class="w-4 h-4 shrink-0"></i>
                    <div class="flex-1 min-w-0">
                        <span class="font-syne text-sm font-semibold truncate">Geofencing</span>
                    </div>
                </a>

                <a th:href="@{/statistik}"
                   th:classappend="${activeMenu == 'statistik'} ? 'bg-wms-accent/10 border border-wms-accent/20 text-wms-accent' : 'text-wms-text-muted hover:text-wms-text hover:bg-wms-surface-2'"
                   class="group flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 mt-1">
                    <i data-lucide="bar-chart-3" class="w-4 h-4 shrink-0"></i>
                    <div class="flex-1 min-w-0">
                        <span class="font-syne text-sm font-semibold truncate">Statistics</span>
                    </div>
                </a>
            </div>

            <div class="mb-4 mt-6">
                <p class="px-3 mb-2 text-[9px] uppercase tracking-widest text-wms-text-dim font-semibold">System</p>

                <a th:href="@{/simulator}"
                   th:classappend="${activeMenu == 'simulator'} ? 'bg-wms-accent/10 border border-wms-accent/20 text-wms-accent' : 'text-wms-text-muted hover:text-wms-text hover:bg-wms-surface-2'"
                   class="group flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200">
                    <i data-lucide="radio" class="w-4 h-4 shrink-0"></i>
                    <div class="flex-1 min-w-0">
                        <span class="font-syne text-sm font-semibold truncate">GPS Simulator</span>
                    </div>
                </a>

                <a th:href="@{/peringatan}"
                   th:classappend="${activeMenu == 'peringatan'} ? 'bg-red-500/10 border border-red-500/20 text-red-500' : 'text-wms-text-muted hover:text-wms-text hover:bg-wms-surface-2'"
                   class="group flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 mt-1">
                    <i data-lucide="bell-ring" class="w-4 h-4 shrink-0"></i>
                    <div class="flex-1 min-w-0">
                        <span class="font-syne text-sm font-semibold truncate">System Alerts</span>
                    </div>
                </a>
            </div>
        </th:block>
    </nav>

    <div class="px-4 py-4 border-t border-wms-border">
        <a th:href="@{/logout}" class="flex items-center gap-2 px-3 py-2.5 rounded-xl bg-red-500/10 hover:bg-red-500/20 border border-transparent hover:border-red-500/20 text-red-500 transition-colors">
            <i data-lucide="log-out" class="w-4 h-4 shrink-0"></i>
            <div class="min-w-0">
                <p class="text-xs font-semibold">Logout Sistem</p>
                <p class="text-[10px] truncate uppercase font-bold tracking-wider opacity-70" th:text="${session.userName != null ? session.userName : 'Unknown'}"></p>
            </div>
        </a>
    </div>
</aside>
