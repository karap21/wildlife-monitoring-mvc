<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Geofencing - WildTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
        tailwind.config = { theme: { extend: { colors: { 'wms-bg': '#0f172a', 'wms-surface': '#1e293b', 'wms-text': '#f8fafc', 'wms-accent': '#22c55e' } } } }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        #map { height: calc(100vh - 4rem); width: 100%; border-radius: 0.75rem; z-index: 10; }
    </style>
</head>
<body class="bg-wms-bg text-wms-text flex h-screen overflow-hidden font-sans">

<div th:replace="~{fragments/sidebar :: sidebar('geozone')}"></div>

<main class="flex-1 flex p-6 gap-6 relative">

    <div class="w-96 flex flex-col gap-6 shrink-0 h-full overflow-y-auto custom-scrollbar pr-2">
        <div>
            <h1 class="text-2xl font-bold text-wms-accent">Habitat Geofencing</h1>
            <p class="text-sm text-gray-400">Gambar batas virtual langsung di peta</p>
        </div>

        <form th:action="@{/geozone/simpan}" method="POST" id="formGeozone" class="bg-wms-surface p-5 rounded-xl border border-gray-700 shadow-xl flex flex-col gap-4">
            <input type="hidden" name="zoneId" id="inputZoneId">
            <input type="hidden" name="polygonCoordinates" id="polygonInput" required>

            <div>
                <input type="text" name="name" id="inputName" placeholder="Nama Zona (Misal: Hutan Lindung)" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-wms-accent">
            </div>

            <div class="border border-gray-700 rounded-lg p-3 bg-gray-900/50">
                <p class="text-xs text-gray-400 mb-3">Pilih Satwa Penghuni Zona (Bisa lebih dari 1)</p>
                <div class="max-h-40 overflow-y-auto custom-scrollbar space-y-2">
                    <label th:each="hewan : ${daftarHewan}" class="flex items-center gap-3 cursor-pointer hover:bg-gray-800 p-2 rounded-md transition-colors border border-gray-700">
                        <input type="checkbox" name="animalIds" th:value="${hewan.animal_id}" class="animal-checkbox w-4 h-4 text-wms-accent bg-gray-800 border-gray-600 rounded">
                        <div class="min-w-0">
                            <span class="text-sm text-white font-medium block truncate" th:text="${hewan.name}"></span>
                            <span class="text-[10px] text-wms-accent block truncate" th:text="${hewan.species_name}"></span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="bg-blue-900/20 border border-blue-500/30 p-3 rounded-lg text-xs text-blue-300">
                <b>Instruksi:</b> Gambar area di peta sebelah, lalu klik tombol Simpan.
            </div>

            <button type="submit" id="btnSubmit" class="w-full py-3 bg-wms-accent hover:bg-green-600 text-white font-bold rounded-lg transition-colors cursor-pointer shadow-lg shadow-green-500/20">
                Simpan Zona
            </button>
            <button type="button" onclick="resetForm()" id="btnBatal" class="hidden w-full py-2 bg-gray-700 hover:bg-gray-600 text-white font-bold rounded-lg transition-colors cursor-pointer text-sm">
                Batal Edit
            </button>
        </form>

        <div class="bg-wms-surface p-5 rounded-xl border border-gray-700 shadow-xl flex-1 flex flex-col min-h-[250px]">
            <h3 class="text-white font-bold mb-3 flex items-center gap-2 border-b border-gray-700 pb-2"><i data-lucide="list" class="w-4 h-4"></i> Daftar Zona Aktif</h3>
            <div class="space-y-3 overflow-y-auto custom-scrollbar flex-1">
                <div th:each="zona : ${daftarZona}" class="bg-gray-900 border border-gray-700 p-3 rounded-lg flex justify-between items-center group">
                    <div class="min-w-0 pr-2">
                        <p class="text-sm font-bold text-white truncate" th:text="${zona.name}"></p>
                        <p class="text-[10px] text-gray-400 truncate" th:text="'Satwa: ' + (${zona.animal_names} ?: 'Kosong')"></p>
                    </div>
                    <div class="flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                        <button type="button" th:onclick="editZona([[${zona.zone_id}]], [[${zona.name}]], [[${zona.polygon_coordinates}]], [[${zona.animal_ids}]])" class="p-1.5 bg-blue-500/10 hover:bg-blue-500/20 text-blue-500 rounded border border-blue-500/50 cursor-pointer">
                            <i data-lucide="edit-2" class="w-4 h-4"></i>
                        </button>
                        <form th:action="@{/geozone/hapus}" method="POST" onsubmit="return confirm('Hapus zona ini?');">
                            <input type="hidden" name="zoneId" th:value="${zona.zone_id}">
                            <button type="submit" class="p-1.5 bg-red-500/10 hover:bg-red-500/20 text-red-500 rounded border border-red-500/50 cursor-pointer">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="flex-1 bg-wms-surface rounded-xl border border-gray-700 shadow-xl overflow-hidden relative">
        <div id="map"></div>
    </div>
</main>

<script th:inline="javascript">
    lucide.createIcons();

    const map = L.map('map').setView([-2.5, 118.0], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
        edit: { featureGroup: drawnItems },
        draw: { polygon: true, polyline: false, rectangle: false, circle: false, circlemarker: false, marker: false }
    });
    map.addControl(drawControl);

    // Menggambar zona yang sudah ada di database ke peta
    const zonaDB = /*[[${daftarZona}]]*/ [];
    if(zonaDB && zonaDB.length > 0) {
        zonaDB.forEach(z => {
            try {
                const coords = JSON.parse(z.polygon_coordinates);
                L.polygon(coords, {color: '#22c55e', fillColor: '#22c55e', fillOpacity: 0.2}).addTo(map).bindPopup(z.name);
            } catch(e) {}
        });
    }

    map.on(L.Draw.Event.CREATED, function (event) {
        drawnItems.clearLayers();
        const layer = event.layer;
        drawnItems.addLayer(layer);
        const coords = layer.getLatLngs()[0].map(latlng => [latlng.lat, latlng.lng]);
        document.getElementById('polygonInput').value = JSON.stringify(coords);
    });

    map.on(L.Draw.Event.EDITED, function (event) {
        const layers = event.layers;
        layers.eachLayer(function (layer) {
            const coords = layer.getLatLngs()[0].map(latlng => [latlng.lat, latlng.lng]);
            document.getElementById('polygonInput').value = JSON.stringify(coords);
        });
    });

    // FUNGSI JAVASCRIPT UNTUK MODE EDIT
    function editZona(id, name, polyJson, animalIdsStr) {
        // 1. Ubah UI Form
        document.getElementById('inputZoneId').value = id;
        document.getElementById('inputName').value = name;
        document.getElementById('polygonInput').value = polyJson;
        document.getElementById('btnSubmit').innerText = 'Update Zona';
        document.getElementById('btnSubmit').classList.replace('bg-wms-accent', 'bg-blue-600');
        document.getElementById('btnSubmit').classList.replace('hover:bg-green-600', 'hover:bg-blue-500');
        document.getElementById('btnBatal').classList.remove('hidden');

        // 2. Centang Checkbox Satwa
        const checkboxes = document.querySelectorAll('.animal-checkbox');
        checkboxes.forEach(cb => cb.checked = false); // Reset semua
        if(animalIdsStr) {
            const ids = animalIdsStr.split(',');
            checkboxes.forEach(cb => {
                if(ids.includes(cb.value)) cb.checked = true;
            });
        }

        // 3. Masukkan Polygon ke Leaflet Draw agar bisa diedit titiknya
        drawnItems.clearLayers();
        try {
            const coords = JSON.parse(polyJson);
            const polygonLayer = L.polygon(coords, {color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.4});
            drawnItems.addLayer(polygonLayer);
            map.fitBounds(polygonLayer.getBounds(), {padding: [50,50]});
        } catch(e) { console.log("Gagal parse polygon"); }
    }

    function resetForm() {
        document.getElementById('inputZoneId').value = '';
        document.getElementById('inputName').value = '';
        document.getElementById('polygonInput').value = '';
        document.getElementById('btnSubmit').innerText = 'Simpan Zona';
        document.getElementById('btnSubmit').classList.replace('bg-blue-600', 'bg-wms-accent');
        document.getElementById('btnSubmit').classList.replace('hover:bg-blue-500', 'hover:bg-green-600');
        document.getElementById('btnBatal').classList.add('hidden');
        document.querySelectorAll('.animal-checkbox').forEach(cb => cb.checked = false);
        drawnItems.clearLayers();
    }
</script>
</body>
</html>
