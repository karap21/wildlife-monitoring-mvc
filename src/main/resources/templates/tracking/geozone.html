<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geofencing - WildTrack</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
        tailwind.config = { theme: { extend: { colors: { 'wms-bg': '#0f172a', 'wms-surface': '#1e293b', 'wms-text': '#f8fafc', 'wms-accent': '#22c55e' } } } }
    </script>
    <style>
        .leaflet-popup-content-wrapper { background-color: #1e293b; color: #f8fafc; border: 1px solid #334155; }
        .leaflet-popup-tip { background-color: #1e293b; border: 1px solid #334155; }
        .leaflet-draw-toolbar { z-index: 1000; }
        /* CSS Tambahan untuk Scrollbar Elegan */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-wms-bg text-wms-text flex h-screen overflow-hidden font-sans">

<div th:replace="~{fragments/sidebar :: sidebar('geozone')}"></div>

<main class="flex-1 p-6 flex flex-col h-screen overflow-hidden">
    <header class="mb-4 shrink-0">
        <h1 class="text-2xl font-bold text-wms-accent">Habitat Geofencing</h1>
        <p class="text-sm text-gray-400 mt-1">Gambar batas virtual (zona aman) langsung di peta</p>
    </header>

    <div class="flex flex-col lg:flex-row gap-6 flex-1 min-h-0">

        <div class="w-full lg:w-1/3 flex flex-col gap-6 overflow-y-auto custom-scrollbar pr-2 pb-4">

            <div class="bg-wms-surface p-5 rounded-xl border border-gray-700 shrink-0">
                <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
                    <i data-lucide="edit-3" class="w-5 h-5 text-wms-accent"></i> Buat Zona Baru
                </h3>

                <form th:action="@{/geozone/simpan}" method="POST" id="geozoneForm" class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Nama Zona *</label>
                        <input type="text" name="name" required placeholder="mis: Habitat Harimau" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-wms-accent">
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-2">Pilih Satwa Penghuni Zona (Bisa lebih dari 1)</label>
                        <div class="max-h-32 overflow-y-auto custom-scrollbar bg-gray-900 border border-gray-600 rounded-lg p-2 space-y-1">

                            <label th:each="hewan : ${daftarHewan}" class="flex items-start gap-3 p-2 hover:bg-gray-800 rounded-lg cursor-pointer border border-transparent hover:border-gray-700 transition-colors">
                                <input type="checkbox" name="animalIds" th:value="${hewan.animal_id}" class="mt-1 w-4 h-4 rounded text-wms-accent focus:ring-wms-accent bg-gray-800 border-gray-600 cursor-pointer">
                                <div>
                                    <p class="text-sm text-white font-medium" th:text="${hewan.name}">Nama Hewan</p>
                                    <p class="text-xs text-wms-accent" th:text="${hewan.species_name}">Spesies</p>
                                </div>
                            </label>

                            <div th:if="${#lists.isEmpty(daftarHewan)}" class="text-xs text-gray-500 text-center py-2">Belum ada data satwa di sistem.</div>
                        </div>
                    </div>

                    <input type="hidden" id="polygonCoords" name="polygonCoordinates">

                    <div class="p-3 bg-blue-500/10 border border-blue-500/30 rounded-lg">
                        <p class="text-xs text-blue-300 leading-relaxed"><b>Instruksi:</b> Gambar area di peta sebelah menggunakan ikon ⬟, lalu klik tombol Simpan di bawah.</p>
                    </div>

                    <button type="submit" class="w-full py-2.5 bg-wms-accent hover:bg-green-600 font-bold rounded-lg text-white transition-colors cursor-pointer">
                        Simpan Zona
                    </button>
                </form>
            </div>

            <div class="bg-wms-surface p-5 rounded-xl border border-gray-700 shrink-0 min-h-[200px]">
                <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
                    <i data-lucide="list" class="w-5 h-5 text-gray-400"></i> Daftar Zona Aktif
                </h3>

                <div class="space-y-3">
                    <div th:if="${#lists.isEmpty(daftarZona)}" class="text-center py-8 text-gray-500 text-sm border border-dashed border-gray-700 rounded-lg">
                        Belum ada zona yang terdaftar.
                    </div>

                    <div th:each="zona : ${daftarZona}" class="p-3 bg-gray-800 border border-gray-700 rounded-lg flex justify-between items-center group">
                        <div class="min-w-0">
                            <h4 class="font-semibold text-white text-sm truncate" th:text="${zona.name}">Nama Zona</h4>
                            <p class="text-xs text-gray-400 truncate" th:text="${zona.linked_animals != null ? 'Satwa: ' + zona.linked_animals : 'Belum ada satwa'}">Satwa</p>
                        </div>
                        <form th:action="@{/geozone/hapus}" method="POST" onsubmit="return confirm('Hapus zona aman ini?');">
                            <input type="hidden" name="zoneId" th:value="${zona.zone_id}">
                            <button type="submit" class="p-1.5 text-gray-500 hover:text-red-500 bg-gray-700 hover:bg-red-500/20 rounded-lg transition-colors ml-2 opacity-50 group-hover:opacity-100 cursor-pointer">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>

        <div class="w-full lg:w-2/3 bg-gray-900 border border-gray-700 rounded-xl relative overflow-hidden min-h-[500px]">
            <div id="map" class="absolute inset-0 z-10"></div>
        </div>

    </div>
</main>

<script th:inline="javascript">
    lucide.createIcons();

    const daftarZona = /*[[${daftarZona}]]*/ [];

    const map = L.map('map').setView([-2.5, 118.0], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    if(daftarZona && daftarZona.length > 0) {
        const bounds = [];
        daftarZona.forEach(zona => {
            const coords = JSON.parse(zona.polygon_coordinates);
            const polygon = L.polygon(coords, {color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.2, weight: 2}).addTo(map);
            polygon.bindPopup(`<b>${zona.name}</b><br>Satwa: ${zona.linked_animals || 'Belum ada satwa'}`);
            bounds.push(polygon.getBounds());
        });
        if(bounds.length > 0) {
            const masterBounds = bounds[0];
            for(let i = 1; i < bounds.length; i++) masterBounds.extend(bounds[i]);
            map.fitBounds(masterBounds, { padding: [50, 50] });
        }
    }

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
        edit: { featureGroup: drawnItems },
        draw: {
            polygon: { shapeOptions: { color: '#22c55e' } },
            polyline: false, circle: false, rectangle: false, marker: false, circlemarker: false
        }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (event) {
        drawnItems.clearLayers();
        const layer = event.layer;
        drawnItems.addLayer(layer);

        const latlngs = layer.getLatLngs()[0];
        const coordsArray = latlngs.map(ll => [ll.lat, ll.lng]);
        document.getElementById('polygonCoords').value = JSON.stringify(coordsArray);
    });

    document.getElementById('geozoneForm').addEventListener('submit', function(e) {
        if(!document.getElementById('polygonCoords').value) {
            e.preventDefault();
            alert("ERROR: Anda belum menggambar area zona di peta! Gunakan ikon segilima di kiri atas peta.");
        }
    });
</script>
</body>
</html>
