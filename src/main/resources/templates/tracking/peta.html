<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Pelacakan - WildTrack</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = { theme: { extend: { colors: { 'wms-bg': '#0f172a', 'wms-surface': '#1e293b', 'wms-text': '#f8fafc', 'wms-accent': '#22c55e' } } } }
    </script>

    <style>
        /* Agar peta tampil penuh menutupi layar sisa */
        #map { height: calc(100vh - 8rem); width: 100%; border-radius: 0.75rem; z-index: 10; }

        /* Desain Popup Custom */
        .leaflet-popup-content-wrapper { background-color: #1e293b; color: #f8fafc; border: 1px solid #334155; }
        .leaflet-popup-tip { background-color: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="bg-wms-bg text-wms-text flex h-screen overflow-hidden font-sans">

<div th:replace="~{fragments/sidebar :: sidebar('pelacakan')}"></div>

<main class="flex-1 overflow-y-auto p-8 flex flex-col">
    <header class="mb-6 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-bold">Real-Time Tracking Map</h1>
            <p class="text-sm text-gray-400 mt-1">Pemantauan titik koordinat terakhir satwa liar</p>
        </div>
        <div class="bg-wms-surface border border-gray-700 px-4 py-2 rounded-lg flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></span>
            <span class="text-sm text-gray-300 font-medium">Sistem Satelit Aktif</span>
        </div>
    </header>

    <div id="map" class="shadow-xl border border-gray-700 relative"></div>
</main>

<script th:inline="javascript">
    lucide.createIcons();

    // 1. Ambil data dari PelacakanController
    const dataSatwa = /*[[${dataLokasi}]]*/ [];

    // 2. Inisialisasi Peta (Center default: Titik tengah Indonesia)
    const map = L.map('map').setView([-2.5, 118.0], 5);

    // 3. Masukkan Tile Layer (Desain Peta OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 4. Modifikasi Ikon Marker Bawaan Leaflet agar rapi
    const iconDefault = L.icon({
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34]
    });

    // 5. Looping Data Satwa untuk Membuat Marker
    if (dataSatwa && dataSatwa.length > 0) {
        const bounds = []; // Untuk menyesuaikan zoom otomatis

        dataSatwa.forEach(satwa => {
            const lat = parseFloat(satwa.latitude);
            const lng = parseFloat(satwa.longitude);

            if (!isNaN(lat) && !isNaN(lng)) {
                // Buat struktur HTML untuk isi Popup
                const popupHTML = `
                        <div class="p-1">
                            <h3 class="font-bold text-green-400 text-base mb-1">${satwa.animal_name}</h3>
                            <p class="text-xs text-gray-400 italic border-b border-gray-600 pb-2 mb-2">${satwa.species_name}</p>
                            <div class="space-y-1 text-sm">
                                <p>📡 <b>SN:</b> ${satwa.serial_number}</p>
                                <p>🔋 <b>Baterai:</b> ${satwa.battery_level}%</p>
                                <p>⏱ <b>Update:</b> <br> ${new Date(satwa.recorded_at).toLocaleString()}</p>
                            </div>
                        </div>
                    `;

                // Tanam marker ke peta
                const marker = L.marker([lat, lng], {icon: iconDefault})
                    .addTo(map)
                    .bindPopup(popupHTML);

                bounds.push([lat, lng]);
            }
        });

        // Otomatis menyesuaikan pandangan kamera peta agar semua marker terlihat
        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [50, 50] });
        }
    }
</script>
</body>
</html>
