<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wildlife Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex items-center justify-center font-sans">
<div class="max-w-md w-full bg-gray-800 rounded-2xl shadow-xl p-8 border border-gray-700">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-green-500 mb-2">WildTrack</h1>
        <p class="text-gray-400 text-sm">Monitoring System Authentication</p>
    </div>

    <div th:if="${error}" class="bg-red-500/10 border border-red-500 text-red-500 p-3 rounded-lg mb-6 text-sm text-center">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/login}" method="POST" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
            <input type="email" name="email" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-green-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
            <input type="password" name="password" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-green-500">
        </div>
        <button type="submit" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-4 rounded-xl transition-colors">Sign In</button>
    </form>
</div>
</body>
</html>
