<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Hewan - WildTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'wms-bg': '#0f172a', 'wms-surface': '#1e293b', 'wms-text': '#f8fafc', 'wms-accent': '#22c55e', 'wms-danger': '#ef4444' } } } }
    </script>
</head>
<body class="bg-wms-bg text-wms-text flex h-screen overflow-hidden">

<div th:replace="~{fragments/sidebar :: sidebar('hewan')}"></div>

<main class="flex-1 overflow-y-auto p-8">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-wms-text">Manajemen Satwa</h1>
            <p class="text-sm text-gray-400 mt-1">Kelola data hewan dan informasi spesies</p>
        </div>
        <button onclick="bukaModal(null)" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-wms-accent text-white font-semibold text-sm hover:bg-green-600 transition-colors">
            <i data-lucide="plus" class="w-4 h-4"></i> Tambah Hewan
        </button>
    </div>

    <div class="bg-wms-surface p-4 rounded-xl border border-gray-700 mb-6 flex flex-col md:flex-row items-center gap-4">
        <form th:action="@{/hewan}" method="GET" class="flex-1 flex flex-col md:flex-row gap-4 w-full">

            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" name="search" th:value="${keywordPencarian}" placeholder="Cari berdasarkan nama atau spesies..."
                       class="w-full bg-gray-900 border border-gray-600 rounded-lg pl-10 pr-4 py-2 text-sm text-white focus:outline-none focus:border-wms-accent">
            </div>

            <div class="md:w-64">
                <select name="filterSpesies" onchange="this.form.submit()" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-wms-accent cursor-pointer">
                    <option value="">-- Semua Spesies --</option>
                    <option th:each="spesies : ${daftarSpesies}"
                            th:value="${spesies.species_id}"
                            th:text="${spesies.common_name}"
                            th:selected="${spesies.species_id == spesiesTerpilih}">
                    </option>
                </select>
            </div>

            <button type="submit" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition-colors font-semibold text-sm">
                Cari
            </button>
        </form>
    </div>

    <div class="bg-wms-surface rounded-xl border border-gray-700 overflow-hidden">
        <div class="p-6 grid gap-3">
            <div th:if="${#lists.isEmpty(daftarHewan)}" class="text-center py-12">
                <i data-lucide="paw-print" class="w-12 h-12 text-gray-600 mx-auto mb-4"></i>
                <p class="text-gray-400">Tidak ada data hewan ditemukan.</p>
            </div>

            <div th:each="hewan : ${daftarHewan}" class="p-4 rounded-xl border border-gray-600 bg-gray-800 hover:border-wms-accent/50 transition-all group flex justify-between items-center">
                <div class="flex items-start gap-4">
                    <div class="w-10 h-10 rounded-xl bg-wms-accent/10 flex items-center justify-center shrink-0">
                        <i data-lucide="paw-print" class="w-5 h-5 text-wms-accent"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-white" th:text="${hewan.name}">Nama Hewan</h3>
                        <p class="text-sm text-gray-400" th:text="${hewan.species_name}">Nama Spesies</p>

                        <div class="mt-2 flex gap-2">
                            <span class="px-2 py-0.5 rounded-md bg-gray-700 border border-gray-600 text-xs font-semibold text-gray-300 uppercase" th:text="${hewan.gender}">MALE</span>
                            <span th:if="${hewan.is_active}" class="px-2 py-0.5 rounded-md bg-green-500/10 border border-green-500/20 text-xs font-semibold text-green-400">Active</span>
                            <span th:unless="${hewan.is_active}" class="px-2 py-0.5 rounded-md bg-red-500/10 border border-red-500/20 text-xs font-semibold text-red-400">Inactive</span>

                            <span th:if="${hewan.linked_device != null}" class="px-2 py-0.5 rounded-md bg-blue-500/10 border border-blue-500/20 text-xs font-semibold text-blue-400 flex items-center gap-1">
                                <i data-lucide="radio" class="w-3 h-3"></i> Terhubung: <span th:text="${hewan.linked_device}"></span>
                            </span>
                            <span th:if="${hewan.linked_device == null}" class="px-2 py-0.5 rounded-md bg-gray-700 border border-gray-600 text-xs italic text-gray-400">
                                Belum ada perangkat GPS
                            </span>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button type="button" th:onclick="bukaModal([[${hewan.animal_id}]], [[${hewan.name}]], [[${hewan.species_id}]], [[${hewan.gender}]], [[${hewan.birth_date}]], [[${hewan.is_active}]])"
                            class="p-2 text-gray-400 hover:text-white bg-gray-700 hover:bg-gray-600 rounded-lg">
                        <i data-lucide="edit-2" class="w-4 h-4"></i>
                    </button>

                    <form th:action="@{/hewan/hapus}" method="POST" onsubmit="return confirm('Apakah Anda yakin ingin menghapus hewan ini?');">
                        <input type="hidden" name="id" th:value="${hewan.animal_id}">
                        <button type="submit" class="p-2 text-gray-400 hover:text-red-500 bg-gray-700 hover:bg-red-500/20 rounded-lg">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="modalHewan" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
    <div class="bg-wms-surface w-full max-w-lg rounded-2xl p-6 border border-gray-700">
        <h3 id="modalTitle" class="text-xl font-bold text-white mb-6">Tambah Hewan Baru</h3>

        <form th:action="@{/hewan/simpan}" method="POST" class="space-y-4">
            <input type="hidden" id="formId" name="id">

            <div>
                <label class="block text-sm text-gray-400 mb-1">Nama Hewan *</label>
                <input type="text" id="formName" name="name" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-wms-accent">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Spesies *</label>
                    <select id="formSpecies" name="speciesId" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-wms-accent">
                        <option value="">-- Pilih Spesies --</option>
                        <option th:each="spesies : ${daftarSpesies}" th:value="${spesies.species_id}" th:text="${spesies.common_name}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Jenis Kelamin</label>
                    <select id="formGender" name="gender" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-wms-accent">
                        <option value="unknown">Unknown</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Tanggal Lahir</label>
                    <input type="date" id="formBirthDate" name="birthDate" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-wms-accent">
                </div>
                <div class="flex items-end pb-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="formActive" name="isActive" checked class="w-4 h-4 text-wms-accent focus:ring-wms-accent bg-gray-900 border-gray-600 rounded">
                        <span class="text-sm text-gray-300">Hewan Aktif</span>
                    </label>
                </div>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t border-gray-700 mt-6">
                <button type="button" onclick="document.getElementById('modalHewan').classList.add('hidden')" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg">Batal</button>
                <button type="submit" class="px-4 py-2 bg-wms-accent hover:bg-green-600 text-white font-bold rounded-lg flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> Simpan
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    lucide.createIcons();

    function bukaModal(id, name, speciesId, gender, birthDate, isActive) {
        document.getElementById('modalHewan').classList.remove('hidden');

        if (id) {
            document.getElementById('modalTitle').innerText = 'Edit Data Hewan';
            document.getElementById('formId').value = id;
            document.getElementById('formName').value = name;
            document.getElementById('formSpecies').value = speciesId;
            document.getElementById('formGender').value = gender;
            document.getElementById('formBirthDate').value = birthDate ? birthDate : '';
            document.getElementById('formActive').checked = isActive;
        } else {
            document.getElementById('modalTitle').innerText = 'Tambah Hewan Baru';
            document.getElementById('formId').value = '';
            document.getElementById('formName').value = '';
            document.getElementById('formSpecies').value = '';
            document.getElementById('formGender').value = 'unknown';
            document.getElementById('formBirthDate').value = '';
            document.getElementById('formActive').checked = true;
        }
    }
</script>
</body>
</html>
