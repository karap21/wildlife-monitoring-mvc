<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Devices - WildTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'wms-bg': '#0f172a', 'wms-surface': '#1e293b', 'wms-text': '#f8fafc', 'wms-accent': '#22c55e', 'wms-danger': '#ef4444', 'wms-warning': '#eab308', 'wms-info': '#3b82f6' } } } }
    </script>
</head>
<body class="bg-wms-bg text-wms-text flex h-screen overflow-hidden font-sans">

<div th:replace="~{fragments/sidebar :: sidebar('perangkat')}"></div>

<main class="flex-1 overflow-y-auto p-8">

    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold">GPS Devices</h1>
            <p class="text-sm text-gray-400 mt-1">Manage tracking devices and battery status</p>
        </div>
        <button onclick="bukaModal(null)" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-wms-accent text-white font-semibold text-sm hover:bg-green-600 transition-colors">
            <i data-lucide="plus" class="w-4 h-4"></i> Add Device
        </button>
    </div>

    <div class="bg-wms-surface rounded-xl border border-gray-700 overflow-hidden">
        <div class="p-6 border-b border-gray-700">
            <h2 class="text-lg font-semibold">Device Inventory</h2>
        </div>

        <div class="p-6">
            <div th:if="${#lists.isEmpty(daftarPerangkat)}" class="text-center py-12">
                <i data-lucide="cpu" class="w-12 h-12 text-gray-600 mx-auto mb-4"></i>
                <p class="text-gray-400">No devices found</p>
            </div>

            <div class="grid gap-4">
                <div th:each="alat : ${daftarPerangkat}" class="p-4 rounded-xl border border-gray-600 bg-gray-800 hover:border-wms-accent/50 transition-all group">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex items-start gap-4">
                            <div class="w-10 h-10 rounded-xl bg-wms-accent/10 flex items-center justify-center shrink-0">
                                <i data-lucide="cpu" class="w-5 h-5 text-wms-accent"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-white truncate" th:text="${alat.model}">Model GPS</h3>
                                <p class="text-sm text-gray-400 font-mono">SN: <span th:text="${alat.serial_number}">123</span></p>

                                <p class="text-xs mt-1">
                                    <span th:if="${alat.animal_name != null}" class="text-wms-info" th:text="'Assigned to: ' + ${alat.animal_name}">Assigned</span>
                                    <span th:unless="${alat.animal_name != null}" class="text-wms-warning">⚠️ Not assigned</span>
                                </p>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <span th:if="${alat.status == 'ONLINE'}" class="px-2.5 py-1 rounded-full text-xs font-semibold border bg-green-500/10 text-green-400 border-green-500/20">ONLINE</span>
                            <span th:if="${alat.status == 'OFFLINE'}" class="px-2.5 py-1 rounded-full text-xs font-semibold border bg-gray-500/10 text-gray-400 border-gray-500/20">OFFLINE</span>

                            <button type="button" th:onclick="bukaModal([[${alat.device_id}]], [[${alat.model}]], [[${alat.serial_number}]], [[${alat.animal_id}]], [[${alat.battery_life_months}]], [[${alat.installation_date}]])" class="p-1.5 text-gray-400 hover:text-white bg-gray-700 rounded-lg">
                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                            </button>

                            <form th:action="@{/perangkat/hapus}" method="POST" onsubmit="return confirm('Hapus perangkat ini?');">
                                <input type="hidden" name="id" th:value="${alat.device_id}">
                                <button type="submit" class="p-1.5 text-gray-400 hover:text-wms-danger bg-gray-700 hover:bg-red-500/20 rounded-lg">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="mt-4 pt-4 border-t border-gray-700 grid grid-cols-3 gap-4">
                        <div class="flex items-center gap-2">
                            <i data-lucide="battery" class="w-4 h-4 text-wms-accent"></i>
                            <div>
                                <p class="text-xs text-gray-400">Battery</p>
                                <p class="text-sm font-medium" th:text="${alat.battery_level} + '%'">100%</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <i data-lucide="signal" class="w-4 h-4 text-wms-info"></i>
                            <div>
                                <p class="text-xs text-gray-400">Signal</p>
                                <p class="text-sm font-medium" th:text="${alat.signal_strength} + '%'">100%</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <i data-lucide="clock" class="w-4 h-4 text-wms-warning"></i>
                            <div>
                                <p class="text-xs text-gray-400">Last Seen</p>
                                <p class="text-sm font-medium" th:text="${alat.last_seen}">Waktu</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="modalPerangkat" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
    <div class="bg-wms-surface w-full max-w-lg rounded-2xl p-6 border border-gray-700 relative">
        <button type="button" onclick="document.getElementById('modalPerangkat').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-white">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>

        <h3 id="modalTitle" class="text-xl font-bold text-white mb-6">Add New Device</h3>

        <form th:action="@{/perangkat/simpan}" method="POST" class="space-y-4">
            <input type="hidden" id="formId" name="id">

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Device Model *</label>
                <select id="formModel" name="model" onchange="toggleCustomModel()" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-wms-accent">
                    <option value="">Select model...</option>
                    <option value="GPS-Collar-X1">GPS-Collar-X1</option>
                    <option value="Sat-Tracker-Pro">Sat-Tracker-Pro</option>
                    <option value="WildTrack-Lite">WildTrack-Lite</option>
                    <option value="__custom__">Other (Custom Model)</option>
                </select>
                <input type="text" id="customModelInput" name="customModel" placeholder="Enter custom model name" class="hidden mt-2 w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-wms-accent">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Serial Number *</label>
                <input type="text" id="formSerial" name="serialNumber" required placeholder="e.g. SN-2026-001" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-wms-accent">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Link to Animal <span class="text-gray-500">(Optional)</span></label>
                <select id="formAnimal" name="animalId" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-wms-accent">
                    <option value="">-- Unassigned (Tanpa hewan) --</option>
                    <option th:each="hewan : ${daftarHewan}" th:value="${hewan.animal_id}" th:text="${hewan.name}"></option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Battery Life (Months)</label>
                    <input type="number" id="formBattery" name="batteryLifeMonths" value="12" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-wms-accent">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Installation Date</label>
                    <input type="date" id="formInstallDate" name="installationDate" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-wms-accent">
                </div>
            </div>

            <div class="flex gap-3 pt-4 border-t border-gray-700 mt-6">
                <button type="submit" class="flex-1 px-4 py-2 bg-wms-accent hover:bg-green-600 text-white font-bold rounded-lg flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> Save Device
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    lucide.createIcons();

    function toggleCustomModel() {
        const modelSelect = document.getElementById('formModel');
        const customInput = document.getElementById('customModelInput');
        if (modelSelect.value === '__custom__') {
            customInput.classList.remove('hidden');
            customInput.required = true;
        } else {
            customInput.classList.add('hidden');
            customInput.required = false;
        }
    }

    function bukaModal(id, model, serial, animalId, battery, installDate) {
        document.getElementById('modalPerangkat').classList.remove('hidden');

        const modelSelect = document.getElementById('formModel');
        const customInput = document.getElementById('customModelInput');

        if (id) {
            document.getElementById('modalTitle').innerText = 'Edit Device';
            document.getElementById('formId').value = id;
            document.getElementById('formSerial').value = serial;
            document.getElementById('formAnimal').value = animalId || '';
            document.getElementById('formBattery').value = battery || 12;
            document.getElementById('formInstallDate').value = installDate || '';

            // Cek apakah model ada di daftar dropdown
            let modelExists = false;
            for (let i = 0; i < modelSelect.options.length; i++) {
                if (modelSelect.options[i].value === model) {
                    modelExists = true; break;
                }
            }
            if (modelExists) {
                modelSelect.value = model;
                customInput.classList.add('hidden');
            } else {
                modelSelect.value = '__custom__';
                customInput.value = model;
                customInput.classList.remove('hidden');
            }
        } else {
            document.getElementById('modalTitle').innerText = 'Add New Device';
            document.getElementById('formId').value = '';
            document.getElementById('formSerial').value = '';
            document.getElementById('formAnimal').value = '';
            document.getElementById('formBattery').value = 12;
            document.getElementById('formInstallDate').value = new Date().toISOString().split('T')[0];
            modelSelect.value = '';
            customInput.value = '';
            customInput.classList.add('hidden');
        }
    }
</script>
</body>
</html>
