<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Spesies - WildTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'wms-bg': '#0f172a', 'wms-surface': '#1e293b', 'wms-text': '#f8fafc', 'wms-accent': '#22c55e', 'wms-danger': '#ef4444' } } } }
    </script>
</head>
<body class="bg-wms-bg text-wms-text flex h-screen overflow-hidden">

<div th:replace="~{fragments/sidebar :: sidebar('spesies')}"></div>

<main class="flex-1 overflow-y-auto p-8">

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold text-wms-text">Manajemen Spesies</h1>
            <p class="text-sm text-gray-400">Kelola master data spesies dan status konservasi</p>
        </div>
        <button onclick="document.getElementById('modalTambah').classList.remove('hidden')"
                class="bg-wms-accent hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-lg flex items-center gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i> Tambah Spesies
        </button>
    </div>

    <div class="bg-wms-surface p-4 rounded-xl border border-gray-700 mb-6">
        <form th:action="@{/spesies}" method="GET" class="relative flex-1 max-w-md">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="text" name="search" th:value="${keywordPencarian}" placeholder="Cari nama umum atau ilmiah..."
                   class="w-full bg-gray-900 border border-gray-600 rounded-lg pl-10 pr-4 py-2 text-white focus:outline-none focus:border-wms-accent">
        </form>
    </div>

    <div class="bg-wms-surface rounded-xl border border-gray-700 overflow-hidden">
        <div class="p-6 grid gap-3">

            <div th:if="${#lists.isEmpty(daftarSpesies)}" class="text-center py-12 text-gray-400">
                <p>Tidak ada data spesies ditemukan.</p>
            </div>

            <div th:each="spesies : ${daftarSpesies}" class="p-4 rounded-xl border border-gray-600 bg-gray-800 flex justify-between items-center group">
                <div class="flex items-start gap-4">
                    <div class="w-10 h-10 rounded-xl bg-wms-accent/10 flex items-center justify-center shrink-0">
                        <i data-lucide="leaf" class="w-5 h-5 text-wms-accent"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-white" th:text="${spesies.common_name}">Harimau</h3>
                        <p class="text-sm text-gray-400 italic" th:text="${spesies.scientific_name}">Panthera tigris</p>

                        <div th:if="${spesies.status_name != null}" class="mt-2 inline-block px-2 py-1 rounded-full text-xs font-medium"
                             th:style="'color: ' + ${spesies.color_code} + '; border: 1px solid ' + ${spesies.color_code}">
                            <span th:text="${spesies.status_name}">Status</span>
                        </div>

                        <p class="mt-2 text-sm text-gray-400" th:text="${spesies.description}">Deskripsi hewan</p>
                    </div>
                </div>

                <form th:action="@{/spesies/hapus}" method="POST" onsubmit="return confirm('Hapus spesies ini?');">
                    <input type="hidden" name="id" th:value="${spesies.species_id}">
                    <button type="submit" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-500/10 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>

        </div>
    </div>
</main>

<div id="modalTambah" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
    <div class="bg-wms-surface w-full max-w-lg rounded-2xl p-6 border border-gray-700">
        <h3 class="text-xl font-bold text-white mb-6">Tambah Spesies Baru</h3>

        <form th:action="@{/spesies/tambah}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Nama Umum *</label>
                <input type="text" name="commonName" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-wms-accent focus:outline-none">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Nama Ilmiah</label>
                <input type="text" name="scientificName" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-wms-accent focus:outline-none">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Status Konservasi</label>
                <select name="statusId" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-wms-accent focus:outline-none">
                    <option value="">-- Pilih Status --</option>
                    <option th:each="status : ${daftarStatus}"
                            th:value="${status.id}"
                            th:text="${status.display_name}"></option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Deskripsi</label>
                <textarea name="description" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-wms-accent focus:outline-none"></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t border-gray-700">
                <button type="button" onclick="document.getElementById('modalTambah').classList.add('hidden')" class="px-4 py-2 text-gray-400 hover:text-white">Batal</button>
                <button type="submit" class="px-4 py-2 bg-wms-accent hover:bg-green-600 text-white font-bold rounded-lg">Simpan Data</button>
            </div>
        </form>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
